services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rec2form-backend
    expose:
      - "8080"
    env_file:
      - .env
    volumes:
      - rec2form_outputs:/app/outputs
    depends_on:
      - redis
    command: ["uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rec2form-worker
    env_file:
      - .env
    volumes:
      - rec2form_outputs:/app/outputs
    depends_on:
      - redis
    command: ["rq", "worker", "invoice_tasks"]
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: rec2form-redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
    container_name: rec2form-frontend
    ports:
      - "46002:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  rec2form_outputs:
